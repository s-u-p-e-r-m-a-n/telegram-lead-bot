services:
  postgres:
    image: postgres:16
    container_name: telegram-lead-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: telegram_lead_bot
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - telegram_lead_bot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d telegram_lead_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: telegram-lead-bot-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID}
      DB_URL: jdbc:postgresql://postgres:5432/telegram_lead_bot
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      STATS_CRON: ${STATS_CRON}
    ports:
      - "8080:8080"

volumes:
  telegram_lead_bot_postgres_data: